name: calibre_drive
description: "Cliente para bibliotecas Calibre no Google Drive. Navegue em sua coleção de livros, veja detalhes e baixe-os para o seu dispositivo."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  cached_network_image: ^3.4.1
  google_sign_in: ^6.2.1
  googleapis: ^13.1.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  path: ^1.9.1
  path_provider: ^2.1.5
  share_plus: ^10.0.0
  sqflite: ^2.4.2
  http: ^1.6.0
  flutter_html: ^3.0.0
  file_picker: ^8.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  package_info_plus: ^9.0.1
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21 # opcional, mas ajuda a evitar avisos